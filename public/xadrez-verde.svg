<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <!-- Deforma as bordas das faixas pra dar aspecto de pincelada, não de linha reta de régua -->
    <filter id="pincel" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="11" result="ruido" />
      <feDisplacementMap in="SourceGraphic" in2="ruido" scale="3.4" xChannelSelector="R" yChannelSelector="G" result="torto" />
      <feGaussianBlur in="torto" stdDeviation="0.7" />
    </filter>
  </defs>

  <rect width="240" height="240" fill="#FDFDFB" />

  <g filter="url(#pincel)" fill="#5C7A3D">
    <!-- Faixas verticais (largura 40, período 80) -->
    <rect x="0" y="-6" width="40" height="252" opacity="0.115" />
    <rect x="80" y="-6" width="40" height="252" opacity="0.115" />
    <rect x="160" y="-6" width="40" height="252" opacity="0.115" />

    <!-- Faixas horizontais: o cruzamento com as verticais gera o tom mais escuro do xadrez -->
    <rect x="-6" y="0" width="252" height="40" opacity="0.115" />
    <rect x="-6" y="80" width="252" height="40" opacity="0.115" />
    <rect x="-6" y="160" width="252" height="40" opacity="0.115" />
  </g>
</svg>
